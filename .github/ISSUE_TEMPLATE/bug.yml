name: Bug Report
description: Report a bug to help us improve
labels: ['bug', 'triage']

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us reproduce and fix the issue.

  - type: input
    id: title
    attributes:
      label: Title
      description: Brief description of the issue
      placeholder: 'Bug: [Feature] does not work as expected'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Video
      description: Add screenshots or videos if applicable

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: 'OS: Windows 11, Node: 20.x, Browser: Chrome 123'
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Stack Trace
      description: Paste relevant error logs or stack traces
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 'Critical (application crash)'
        - 'High (feature broken)'
        - 'Medium (reduced functionality)'
        - 'Low (minor issue)'
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: I can reproduce the issue
          required: true
        - label: I am using the latest version
          required: false
