name: Feature Request
description: Suggest an idea for this project
labels: ['enhancement']

body:
  - type: markdown
    attributes:
      value: 'Thank you for suggesting a feature! Please describe your idea below.'

  - type: input
    id: title
    attributes:
      label: Title
      description: Brief title for the feature
      placeholder: 'Feature: Add support for ...'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of the feature
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Explain the use case and why this feature is needed
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work
      placeholder: 'The feature should...'

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Other ways to solve this problem

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: This is a new feature request
          required: true
